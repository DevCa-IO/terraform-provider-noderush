# GoReleaser config for the NodeRush Terraform provider.
# Produces the multi-platform zips + SHA256SUMS + GPG signature the Terraform
# Registry expects. Run automatically by .github/workflows/release.yml on a tag.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - '386'
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256
  # The registry requires the manifest's checksum to be IN the SHA256SUMS file,
  # not just the release. Without this it errors: "missing SHA256 checksum for
  # ..._manifest.json".
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT is exported by the release workflow.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # The Terraform Registry pulls the artifacts from the GitHub release. It
  # REQUIRES the registry manifest uploaded as <project>_<version>_manifest.json;
  # without it ingestion fails because the protocol version is unknown.
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  draft: false

changelog:
  disable: true
